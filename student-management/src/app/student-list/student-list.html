<h2>Students</h2>
<table border="1" cellpadding="5">
<tr>
  <th>Reg No</th>
  <th>Roll No</th>
  <th>Name</th>
  <th>Standard</th>
  <th>School</th>
  <th *ngIf="auth.isAdmin()">Actions</th>
</tr>

<tr *ngFor="let s of students">
  <td>{{s.regNo}}</td>
  <td>{{s.rollNo}}</td>
  <td>{{s.name}}</td>
  <td>{{s.standard}}</td>
  <td>{{s.school}}</td>
  <td *ngIf="auth.isAdmin()">
    <button [routerLink]="['/edit', s.regNo]">Edit</button>
    <button (click)="deleteStudent(s.regNo)">Delete</button>
  </td>
</tr>
</table>

<button *ngIf="auth.isAdmin()" routerLink="/add">Add Student</button>
